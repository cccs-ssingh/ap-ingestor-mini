# Set root logger to ERROR
log4j.rootCategory=ERROR, console

# Suppress download-related logs
log4j.logger.org.spark-project=ERROR
log4j.logger.org.apache.spark=ERROR
log4j.logger.org.eclipse.jetty=ERROR
log4j.logger.io.netty=ERROR
log4j.logger.org.apache.hadoop=ERROR
log4j.logger.org.apache.ivy=ERROR  # Ivy is used for artifact downloads
log4j.logger.org.apache.spark.deploy.SparkSubmit=ERROR
log4j.logger.org.apache.spark.sql.execution=ERROR
log4j.logger.org.apache.spark.scheduler.DAGScheduler=ERROR
log4j.logger.org.apache.spark.executor.Executor=ERROR
log4j.logger.org.apache.spark.storage.BlockManager=ERROR
